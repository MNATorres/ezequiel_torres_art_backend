version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ezequiel_art_db
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: portfolio_db
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
